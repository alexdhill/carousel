<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>carousel</title>
    <style>__LANDING_CSS__</style>
</head>
<body>
    <header class="landing__header">
        <span class="landing__brand">carousel</span>
        <span class="landing__tagline">Start a new deck or reopen a recent one</span>
    </header>
    <main class="landing__main">
        <section class="landing__row">
            <h2 class="landing__row-title">Recent</h2>
            <div id="recents" class="landing__cards"></div>
        </section>
        <section class="landing__row">
            <h2 class="landing__row-title">New from theme</h2>
            <div id="layouts" class="landing__cards"></div>
        </section>
    </main>
    <footer class="landing__footer">
        <div class="landing__seg">
            <button type="button" id="landing-cancel" class="landing__seg-btn">Cancel</button>
            <button type="button" id="landing-open" class="landing__seg-btn landing__seg-btn--primary">Open</button>
        </div>
    </footer>
    <script>__LANDING_JS__</script>
</body>
</html>
